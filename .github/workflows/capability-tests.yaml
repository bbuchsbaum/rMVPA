name: capability-tests

on:
  pull_request:
    branches: [main, master]
  push:
    branches: [main, master]
  workflow_dispatch:

jobs:
  capability-tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - capability: core
            extra_packages: any::covr
          - capability: searchlight
            extra_packages: any::sda
          - capability: regional
            extra_packages: any::randomForest, any::sda
          - capability: shard
            extra_packages: any::shard, any::future, any::future.apply
          - capability: remap
            extra_packages: any::rrpack

    env:
      GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
      RGL_USE_NULL: "TRUE"
      RMVPA_RUN_EXTENDED_TESTS: "true"
      R_PROGRESSR_ENABLE: "false"

    steps:
      - uses: actions/checkout@v3

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          needs: check
          extra-packages: |
            any::testthat
            ${{ matrix.extra_packages }}

      - name: Run capability tests
        run: Rscript scripts/run_capability_tests.R ${{ matrix.capability }}
